<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Antigenic map + phylogenetic tree</title>
<style>
  :root { --fg:#222; --muted:#777; --line:#ccc; --bg:#fff; --panel:#fafafa; --hi:#111; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--fg); }
  #app { display:flex; flex-direction:column; height:100vh; }
  header { padding:8px 14px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .meta { color:var(--muted); font-size:12px; }
  header .controls { margin-left:auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  header label { font-size:12px; color:var(--muted); }
  select, input[type=search] { font-size:12px; padding:3px 6px; border:1px solid var(--line); border-radius:4px; }
  #main { display:flex; flex:1; min-height:0; }
  #treePane, #mapPane { min-width:0; display:flex; flex-direction:column; }
  /* #5: give the map(s) more room — tree pane ~39%, map pane the rest (single & grid). */
  #treePane { flex:0 0 39%; border-right:1px solid var(--line); }
  #mapPane { flex:1 1 0; }
  .paneTitle { font-size:12px; font-weight:600; padding:6px 10px; background:var(--panel); border-bottom:1px solid var(--line); color:var(--muted); }
  .paneTitle.row { display:flex; align-items:center; gap:10px; }
  .paneTitle .paneCtl { margin-left:auto; font-weight:400; display:flex; align-items:center; gap:5px; }
  .scroll { overflow:auto; flex:1; }
  #mapWrap { flex:1; position:relative; }
  svg { display:block; }
  /* M1: on-map zoom controls (wheel/pinch + drag also work) */
  .mapCtl { position:absolute; top:8px; right:8px; display:flex; flex-direction:column; gap:4px; z-index:5; }
  .mapCtl button { width:26px; height:26px; font-size:15px; line-height:1; border:1px solid var(--line); background:rgba(255,255,255,.92); border-radius:5px; cursor:pointer; color:var(--fg); padding:0; }
  .mapCtl button:hover { background:#fff; border-color:#999; }
  /* G1: all-centres grid of small multiples */
  /* #5: 3×2 grid for the 5 WHO CCs. minmax(300px,…) keeps each column at least as
     wide as the 300px panel svg so points never spill off the panel; the wrap scrolls
     if the pane is too narrow for three. */
  #gridWrap { flex:1; padding:10px; display:grid; grid-template-columns:repeat(3, minmax(300px, 1fr)); gap:12px; align-content:start; }
  .gridPanel { border:1px solid var(--line); border-radius:5px; overflow:hidden; background:var(--bg); }
  .gridPanelTitle { font-size:11px; font-weight:600; color:var(--muted); padding:4px 8px; background:var(--panel); border-bottom:1px solid var(--line); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gridPanelMap { display:flex; justify-content:center; }
  .edge { stroke:#999; stroke-width:1; fill:none; }
  .tip { cursor:pointer; }
  .tip:hover { stroke:#000; stroke-width:1.2px; }
  .pt { cursor:pointer; }
  .serum { fill:none; stroke:#555; stroke-width:1.3px; }
  .dim { opacity:0.12; }
  .lift { stroke:#000; stroke-width:1.6px; }
  /* S1 selection: persistent blue ring (drawn outside the fill); rubber-band box */
  .sel { stroke:#1558d6; stroke-width:2.4px; paint-order:stroke fill; }
  .sel.dim { opacity:1; }                /* selected points stay visible */
  .selbox { fill:rgba(21,88,214,.08); stroke:#1558d6; stroke-width:1; stroke-dasharray:4 3; pointer-events:none; }
  input[type=search].nohit { border-color:#e15759; background:#fff3f3; }
  /* #9: own stacking context + opaque bg so legend clicks always register even if
     a panel SVG overflows into the legend strip (grid containment is Agent-MAP #8). */
  #legend { padding:8px 10px; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:6px 20px; font-size:11px; max-height:120px; overflow:auto; position:relative; z-index:6; background:var(--bg); }
  .lgSec + .lgSec { border-left:1px solid var(--line); padding-left:16px; }
  .lg { display:flex; align-items:center; gap:4px; user-select:none; padding:1px 4px; border-radius:3px; }
  .lg[title] { cursor:pointer; }
  .lg.off { opacity:0.35; }
  .lg .sw { width:11px; height:11px; border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,.25); }
  .lg .cnt { color:var(--muted); font-variant-numeric:tabular-nums; }
  .lg .cnt::before { content:"·"; margin:0 2px; }
  #tooltip { position:fixed; pointer-events:none; background:rgba(20,20,20,.92); color:#fff; font-size:11px; padding:5px 8px; border-radius:4px; max-width:280px; opacity:0; transition:opacity .05s; z-index:10; line-height:1.35; }
  .footnote { font-size:11px; color:var(--muted); padding:4px 10px; }
  mark { background:#ffe08a; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="title">Antigenic map + phylogenetic tree</h1>
    <span class="meta" id="metaline"></span>
    <div class="controls">
      <label>Centre <select id="chartSel"></select></label>
      <label>Colour <select id="colorBy">
        <option value="clade">clade</option>
        <option value="continent">continent (tree)</option>
        <option value="none">none</option>
      </select></label>
      <input id="search" type="search" placeholder="search strain…" size="18">
      <label><input type="checkbox" id="onlyMatched"> map: linked only</label>
    </div>
  </header>
  <div id="main">
    <div id="treePane">
      <div class="paneTitle" id="treeTitle">Phylogenetic tree</div>
      <div class="scroll" id="treeScroll"><svg id="treeSvg"></svg></div>
    </div>
    <div id="mapPane">
      <div class="paneTitle row">
        <span id="mapTitle">Antigenic map</span>
        <span class="paneCtl">
          <label>View
            <select id="viewMode">
              <option value="single">single map</option>
              <option value="grid">all centres</option>
            </select>
          </label>
        </span>
      </div>
      <div id="mapWrap">
        <svg id="mapSvg"></svg>
        <div class="mapCtl">
          <button id="mapZoomIn" title="Zoom in">+</button>
          <button id="mapZoomOut" title="Zoom out">&minus;</button>
          <button id="mapZoomReset" title="Reset view">&#10239;</button>
        </div>
      </div>
      <div id="gridWrap" class="scroll" style="display:none"></div>
    </div>
  </div>
  <div id="legend"></div>
  <div class="footnote" id="foot"></div>
</div>
<div id="tooltip"></div>
<script>

</body>
</html>
