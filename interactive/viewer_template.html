<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Antigenic map + phylogenetic tree</title>
<style>
  :root { --fg:#222; --muted:#777; --line:#ccc; --bg:#fff; --panel:#fafafa; --hi:#111; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--fg); }
  #app { display:flex; flex-direction:column; height:100vh; }
  header { padding:8px 14px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .meta { color:var(--muted); font-size:12px; }
  header .controls { margin-left:auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  header label { font-size:12px; color:var(--muted); }
  select, input[type=search] { font-size:12px; padding:3px 6px; border:1px solid var(--line); border-radius:4px; }
  #main { display:flex; flex:1; min-height:0; }
  #treePane, #mapPane { flex:1; min-width:0; display:flex; flex-direction:column; }
  #treePane { border-right:1px solid var(--line); }
  .paneTitle { font-size:12px; font-weight:600; padding:6px 10px; background:var(--panel); border-bottom:1px solid var(--line); color:var(--muted); }
  .scroll { overflow:auto; flex:1; }
  #mapWrap { flex:1; position:relative; }
  svg { display:block; }
  .edge { stroke:#999; stroke-width:1; fill:none; }
  .tip { cursor:pointer; }
  .tip:hover { stroke:#000; stroke-width:1.2px; }
  .pt { cursor:pointer; }
  .serum { fill:none; stroke:#555; stroke-width:1.3px; }
  .dim { opacity:0.12; }
  .lift { stroke:#000; stroke-width:1.6px; }
  #legend { padding:8px 10px; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:4px 12px; font-size:11px; max-height:120px; overflow:auto; }
  .lg { display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; padding:1px 4px; border-radius:3px; }
  .lg.off { opacity:0.35; }
  .lg .sw { width:11px; height:11px; border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,.25); }
  #tooltip { position:fixed; pointer-events:none; background:rgba(20,20,20,.92); color:#fff; font-size:11px; padding:5px 8px; border-radius:4px; max-width:280px; opacity:0; transition:opacity .05s; z-index:10; line-height:1.35; }
  .footnote { font-size:11px; color:var(--muted); padding:4px 10px; }
  mark { background:#ffe08a; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="title">Antigenic map + phylogenetic tree</h1>
    <span class="meta" id="metaline"></span>
    <div class="controls">
      <label>Centre <select id="chartSel"></select></label>
      <label>Colour <select id="colorBy">
        <option value="clade">clade</option>
        <option value="continent">continent (tree)</option>
        <option value="none">none</option>
      </select></label>
      <input id="search" type="search" placeholder="search strain…" size="18">
      <label><input type="checkbox" id="onlyMatched"> map: linked only</label>
    </div>
  </header>
  <div id="main">
    <div id="treePane">
      <div class="paneTitle" id="treeTitle">Phylogenetic tree</div>
      <div class="scroll" id="treeScroll"><svg id="treeSvg"></svg></div>
    </div>
    <div id="mapPane">
      <div class="paneTitle" id="mapTitle">Antigenic map</div>
      <div id="mapWrap"><svg id="mapSvg"></svg></div>
    </div>
  </div>
  <div id="legend"></div>
  <div class="footnote" id="foot"></div>
</div>
<div id="tooltip"></div>
<script>
// Bundle injected by export_interactive.py (see CONTRACT.md). Read by main.js.
window.IV = window.IV || {};
window.IV.__DATA__ = /*__DATA__*/;
</script>
<script>

// Kept as a single classic script so the output works from file:// with no deps.

</script>
</body>
</html>
